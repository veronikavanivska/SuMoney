services:
  sumoney:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8888:8080"
    networks:
      - money
      - money-postgres-n

  sumoney-postgres:
    image: postgres
    container_name: "money-postgres-sumoney"
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345678
      - POSTGRES_DB=money
    networks:
      - money-postgres-n
    volumes:
      - money_service_postgres:/var/lib/postgresql/data

volumes:
  money_service_postgres:

networks:
  money:
    driver: bridge
  money-postgres-n:
    driver: bridge