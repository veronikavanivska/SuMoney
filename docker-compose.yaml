services:
  sumoney:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8888:8080"
    networks:
      - money
      - money-postgres-n

  sumoney-postgres:
    image: postgres
    container_name: "money-postgres-sumoney"
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345678
      - POSTGRES_DB=money
    networks:
      - money-postgres-n
    volumes:
      - money_service_postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: sumoney-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  money_service_postgres:
  minio_data:

networks:
  money:
    driver: bridge
  money-postgres-n:
    driver: bridge